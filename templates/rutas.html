{% extends "base.html" %}
{% block title %}Rutas | LASFOR{% endblock %}
{% block content %}
<h2>Rutas</h2>
<form method="post">
  <label>Nombre <input name="nombre" required /></label>
  <label>Vehículo
    <select name="vehiculo_id" required>
      <option value="">Seleccionar</option>
      {% for v in vehiculos %}<option value="{{ v['id'] }}">{{ v['nombre'] }}</option>{% endfor %}
    </select>
  </label>
  <label><input type="checkbox" name="activa" checked /> Activa</label>
  <button type="submit">Guardar</button>
</form>
<table>
  <thead><tr><th>ID</th><th>Nombre</th><th>Vehículo</th><th>Activa</th></tr></thead>
  <tbody>
    {% for r in rutas %}
    <tr><td>{{ r['id'] }}</td><td>{{ r['nombre'] }}</td><td>{{ r['vehiculo'] }}</td><td>{{ 'Sí' if r['activa'] else 'No' }}</td></tr>
    {% else %}
    <tr><td colspan="4">Sin rutas.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
